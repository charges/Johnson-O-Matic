<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Johnson-O-Matic</title>

  <link rel="manifest" href="/Johnson-O-Matic/manifest.json">
  <meta name="theme-color" content="#2563eb">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Johnson-O-Matic">

  <link rel="apple-touch-icon" href="/Johnson-O-Matic/icons/apple-touch-icon.png">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Replace this with the Render URL for the new Johnson backend after deployment.
    const API_URL = 'https://johnson-feed-backend.onrender.com/api/articles';

    const RefreshCw = ({ size = 24, className = "" }) => (
      <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/>
      </svg>
    );

    const BookOpen = ({ size = 24, className = "" }) => (
      <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
    );

    const ExternalLink = ({ size = 24, className = "" }) => (
      <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/>
      </svg>
    );

    const Bookmark = ({ size = 24, className = "", fill = "none" }) => (
      <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="m19 21-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
    );

    const JohnsonFeed = () => {
      const [articles, setArticles] = useState([]);
      const [savedArticles, setSavedArticles] = useState([]);
      const [activeView, setActiveView] = useState('feed');
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [isCached, setIsCached] = useState(false);

      const fetchArticles = async (force = false) => {
        setLoading(true);
        setError(null);

        try {
          let url = API_URL;
          if (force) url += '?force=1';

          const response = await fetch(url);
          if (!response.ok) throw new Error('Failed to fetch Johnson entries from server');

          const data = await response.json();
          setArticles(data.articles || []);
          setIsCached(Boolean(data.cached));
        } catch (err) {
          console.error('Fetch error:', err);
          setError('Unable to load Johnson Dictionary entries. Check that the backend server is running and that the API URL is correct.');
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        fetchArticles(false);
      }, []);

      const toggleSave = (article) => {
        setSavedArticles(prev => {
          const isSaved = prev.some(a => a.id === article.id);
          return isSaved ? prev.filter(a => a.id !== article.id) : [...prev, article];
        });
      };

      const isSaved = (articleId) => savedArticles.some(a => a.id === articleId);

      const ArticleCard = ({ article }) => {
        const [imageError, setImageError] = useState(false);
        const showImage = article.thumbnail && !imageError;
        const structured = article.structured || {};
        const definitions = Array.isArray(structured.definitions) ? structured.definitions : [];

        return (
          <div className="bg-white rounded-lg shadow-md overflow-hidden mb-6 hover:shadow-lg transition-shadow border border-stone-100">
            {showImage && (
              <div className="relative h-44 md:h-48 bg-gradient-to-br from-amber-50 to-stone-100 border-b border-stone-100">
                <img
                  src={article.thumbnail}
                  alt={structured.entryWord || article.title}
                  className="w-full h-full object-cover"
                  onError={() => setImageError(true)}
                />
              </div>
            )}

            <div className="p-5 md:p-6">
              <div className="flex items-center justify-between mb-3">
                <span className="text-[11px] uppercase tracking-[0.16em] font-semibold text-stone-500">
                  {article.source || "Johnson's Dictionary Online"}
                </span>
                <button
                  onClick={() => toggleSave(article)}
                  className={`p-1 rounded hover:bg-stone-100 transition-colors ${isSaved(article.id) ? 'text-blue-600' : 'text-stone-400'}`}
                  aria-label={isSaved(article.id) ? 'Remove saved entry' : 'Save entry'}
                >
                  <Bookmark size={18} fill={isSaved(article.id) ? 'currentColor' : 'none'} />
                </button>
              </div>

              <h2 className="font-serif text-3xl md:text-4xl leading-tight font-bold text-stone-950 mb-2">
                {structured.entryWord || article.title}
                {structured.entryIndex && (
                  <span className="ml-1.5 align-super text-[10px] md:text-xs font-normal text-stone-500 tracking-normal">
                    {structured.entryIndex}
                  </span>
                )}
              </h2>

              {structured.derivation && (
                <div className="mb-4 max-w-3xl font-serif text-sm md:text-base leading-snug text-stone-600 italic">
                  {structured.derivation}
                </div>
              )}

              {definitions.length > 0 ? (
                <div className="space-y-5">
                  {definitions.map((sense, senseIndex) => (
                    <section key={senseIndex} className="border-t border-stone-100 pt-4 first:border-t-0 first:pt-0">
                      {sense.definition && (
                        <p className="font-serif text-lg md:text-xl leading-snug text-stone-900 mb-3">
                          {sense.definition}
                        </p>
                      )}

                      {Array.isArray(sense.examples) && sense.examples.length > 0 && (
                        <div className="space-y-3">
                          {sense.examples.map((example, exampleIndex) => (
                            <div key={exampleIndex} className="ml-3 md:ml-6 pl-3 border-l-2 border-stone-200">
                              <p className="font-serif text-base md:text-lg leading-snug text-stone-800 whitespace-pre-wrap">
                                {example.quote}
                              </p>
                              {example.citation && (
                                <p className="mt-1 font-serif text-sm leading-snug text-stone-600">
                                  {example.citation}
                                </p>
                              )}
                            </div>
                          ))}
                        </div>
                      )}
                    </section>
                  ))}
                </div>
              ) : (
                <p className="text-gray-800 mb-4 leading-relaxed whitespace-pre-wrap font-serif">
                  {article.extract}
                </p>
              )}

              <div className="mt-5">
                <a
                  href={article.url}
                  target="_blank"
                  rel="noopener noreferrer"
                  className="inline-flex items-center gap-2 text-blue-700 hover:text-blue-900 font-medium"
                >
                  View source <ExternalLink size={16} />
                </a>
              </div>
            </div>
          </div>
        );
      };

      const shownArticles = activeView === 'saved' ? savedArticles : articles;

      return (
        <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-50">
          <header className="bg-white shadow-sm sticky top-0 z-10">
            <div className="max-w-4xl mx-auto px-4 py-2">
              <div className="flex items-center justify-between gap-3">
                <div className="flex items-center gap-2">
                  <BookOpen size={22} className="text-blue-600 shrink-0" />
                  {isCached && activeView === 'feed' && (
                    <span className="inline-flex items-center h-7 px-2 text-xs bg-green-100 text-green-700 rounded">
                      Cached
                    </span>
                  )}
                </div>

                <div className="flex items-center gap-2">
                  <button
                    onClick={() => setActiveView(activeView === 'feed' ? 'saved' : 'feed')}
                    className="inline-flex items-center justify-center gap-1.5 h-8 px-3 text-sm text-gray-700 hover:bg-gray-100 rounded-lg transition-colors"
                  >
                    <Bookmark size={18} />
                    <span>({savedArticles.length})</span>
                  </button>

                  <button
                    onClick={() => fetchArticles(true)}
                    disabled={loading}
                    className="inline-flex items-center justify-center gap-1.5 h-8 px-3 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors disabled:opacity-50"
                  >
                    <RefreshCw size={18} className={loading ? 'animate-spin' : ''} />
                    <span>Refresh</span>
                  </button>
                </div>
              </div>

              <div className="mt-2">
                <h1 className="text-2xl font-bold text-gray-900">Johnson-O-Matic</h1>
              </div>
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-4 py-8">
            {activeView === 'feed' ? (
              loading ? (
                <div className="flex flex-col items-center justify-center py-20">
                  <RefreshCw className="animate-spin text-blue-600 mb-4" size={40} />
                  <p className="text-gray-600">Loading Johnson Dictionary entries…</p>
                </div>
              ) : error ? (
                <div className="bg-red-50 border border-red-200 rounded-lg p-6 text-center">
                  <p className="text-red-700 mb-4">{error}</p>
                  <button onClick={() => fetchArticles(true)} className="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">
                    Try Again
                  </button>
                </div>
              ) : shownArticles.length === 0 ? (
                <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-6 text-center">
                  <p className="text-yellow-700">No entries returned.</p>
                </div>
              ) : (
                shownArticles.map(article => <ArticleCard key={article.id} article={article} />)
              )
            ) : (
              <>
                <div className="mb-6">
                  <h2 className="text-2xl font-bold text-gray-900 mb-2">Saved Entries</h2>
                  <p className="text-gray-600">
                    {savedArticles.length === 0 ? 'No saved entries yet.' : `You have ${savedArticles.length} saved entr${savedArticles.length === 1 ? 'y' : 'ies'}.`}
                  </p>
                </div>

                {shownArticles.length > 0 ? (
                  shownArticles.map(article => <ArticleCard key={article.id} article={article} />)
                ) : (
                  <div className="text-center py-20">
                    <Bookmark size={48} className="mx-auto text-gray-300 mb-4" />
                    <p className="text-gray-500">Browse the feed and save entries to read later.</p>
                  </div>
                )}
              </>
            )}
          </main>

          <footer className="mt-12 py-6 text-center text-sm text-gray-500">
            <p>Random entries from Johnson's Dictionary Online.</p>
          </footer>
        </div>
      );
    };

    ReactDOM.render(<JohnsonFeed />, document.getElementById('root'));
  </script>
</body>
</html>
